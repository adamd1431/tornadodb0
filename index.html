<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>UTWX Tornado Database</title>

  <style>
    :root {
      --bg1: #020617;
      --bg2: #0f172a;
      --bg3: #111827;

      --card: rgba(30, 41, 59, 0.65);
      --cardBorder: rgba(255,255,255,0.08);

      --blue: #3b82f6;
      --blueDark: #1d4ed8;

      --text: #ffffff;
      --muted: #94a3b8;
    }

    /* ===== GLOBAL ===== */
    body {
      margin: 0;
      padding: 25px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
      min-height: 100vh;

      background:
        radial-gradient(circle at top, rgba(59,130,246,0.18), transparent 45%),
        radial-gradient(circle at bottom, rgba(239,68,68,0.10), transparent 50%),
        linear-gradient(135deg, var(--bg1), var(--bg2) 50%, var(--bg3));

      background-attachment: fixed;
    }

    /* ===== HEADER ===== */
    h1 {
      text-align: center;
      font-size: 56px;
      margin: 10px 0 8px;
      font-weight: 900;
      letter-spacing: 1px;
      text-shadow: 0 0 25px rgba(59,130,246,0.35);
    }

    p {
      margin: 0;
    }

    /* ===== BUTTONS ===== */
    button {
      background: linear-gradient(135deg, var(--blue), var(--blueDark));
      color: white;
      border: none;
      padding: 11px 16px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s ease;
      box-shadow: 0 6px 18px rgba(59,130,246,0.25);
      margin-right: 8px;
    }

    button:hover {
      transform: translateY(-2px);
      filter: brightness(1.1);
    }

    button:active {
      transform: translateY(0px);
    }

    /* ===== INPUTS ===== */
    input, select {
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #374151;
      background: rgba(17,24,39,0.85);
      color: white;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
    }

    /* ===== NAV ===== */
    .nav {
      position: fixed;
      top: 15px;
      left: 15px;
      right: 15px;
      display: flex;
      justify-content: space-between;
      z-index: 999;
      pointer-events: none;
    }

    .nav-left,
    .nav-right {
      display: flex;
      gap: 10px;
      pointer-events: auto;
    }

    /* ===== HERO ===== */
    .hero {
      text-align: center;
      padding: 80px 20px 25px;
    }

    .hero p {
      font-size: 18px;
      color: var(--muted);
      margin-top: 8px;
    }

    /* ===== STATS ===== */
    .stats {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 16px;
      margin: 20px 0 30px;
    }

    .statBox {
      background: rgba(255,255,255,0.04);
      border: 1px solid #1f2937;
      padding: 22px 36px;
      border-radius: 16px;
      text-align: center;
      min-width: 170px;
      transition: 0.2s ease;
    }

    .statBox:hover {
      transform: translateY(-3px);
      border-color: rgba(59,130,246,0.4);
    }

    .statBox h2 {
      margin: 0;
      font-size: 28px;
    }

    .statBox p {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    /* ===== FILTERS ===== */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      padding: 12px;
      margin-bottom: 25px;
      background: rgba(255,255,255,0.03);
      border: 1px solid #1f2937;
      border-radius: 14px;
      backdrop-filter: blur(8px);
    }

    .searchBar {
      width: 100%;
      max-width: 520px;
      margin: 0 auto 20px;
      display: block;
      font-size: 15px;
      border-radius: 12px;
    }

    /* ===== CARDS ===== */
    .card {
      background: var(--card);
      backdrop-filter: blur(14px);
      border: 1px solid var(--cardBorder);
      border-radius: 18px;
      padding: 20px;
      margin: 16px 0;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      transition: 0.25s ease;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: rgba(59,130,246,0.5);
      box-shadow: 0 16px 40px rgba(59,130,246,0.2);
    }

    /* ===== FORM ===== */
    .formBox {
      display: none;
      position: fixed;
      top: 15%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(31,41,55,0.95);
      border: 1px solid #374151;
      padding: 25px;
      border-radius: 16px;
      width: 360px;
      z-index: 1000;
      backdrop-filter: blur(10px);
    }

    /* ===== FOOTER ===== */
    footer {
      text-align: center;
      margin-top: 60px;
      color: #64748b;
      padding-bottom: 20px;
      font-size: 14px;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #0f172a;
    }

    ::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }

    /* ===== SMALL IMPROVEMENTS ===== */
    * {
      box-sizing: border-box;
    }
  </style>
</head>

<body>

<div id="guestPopup" style="
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 5000;
    ">
      <div style="
        background: #1f2937;
        padding: 30px;
        border-radius: 18px;
        width: 400px;
        max-width: 90%;
        text-align: center;
        border: 1px solid #374151;
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      ">
        <h2 style="margin-top:0;">Browsing as Guest</h2>

        <p style="color:#cbd5e1;">
          You are currently browsing as a guest.
          Sign in to upload tornadoes and access account features.
        </p>

      <div style="display:flex; gap:10px; justify-content:center; margin-top:20px;">
        <button onclick="location.href='login.html'">Sign In</button>
        <button onclick="continueGuest()">Continue as Guest</button>
      </div>
    </div>
  </div>

<div class="nav">
  <div class="nav-left">
    <button onclick="location.href='admin.html'">Admin</button>
    <button onclick="openForm()">+ Add Tornado</button>
  </div>

  <div class="nav-right">
    <button onclick="openRandomTornado()">🎲 Random</button>
    <button onclick="goProfile()">Profile</button>
  </div>
</div>

<div class="hero">
  <h1>🌪 Tornado Database</h1>
  <p>Archive, research, and explore historic tornadoes</p>
</div>

<div class="stats">
  <div class="statBox">
    <h2 id="totalCount">0</h2>
    <p>Tornadoes</p>
  </div>

  <div class="statBox">
    <h2 id="uploadCount">0</h2>
    <p>Uploads</p>
  </div>
</div>

<input id="searchInput" class="searchBar" placeholder="Search..." oninput="applyFilters()" />

<div class="filters">
  <select id="intensityFilter" onchange="applyFilters()">
    <option value="">All Intensities</option>
  </select>

  <select id="yearFilter" onchange="applyFilters()">
    <option value="">All Years</option>
  </select>

  <select id="stateFilter" onchange="applyFilters()">
    <option value="">All States</option>
  </select>

  <select id="sortFilter" onchange="applyFilters()">
    <option value="newest">Newest</option>
    <option value="oldest">Oldest</option>
    <option value="strongest">Strongest</option>
    <option value="weakest">Weakest</option>
  </select>
</div>

<div id="list">Loading...</div>

<div id="formBox" class="formBox">
  <h2>Add Tornado</h2>

  <input id="name" placeholder="Name"><br><br>
  <input id="state" placeholder="State (Country if not in USA)"><br><br>
  <input id="date" type="date"><br><br>

  <select id="intensity">
    <option value="EFU">EFU</option>
    <option value="EF0">EF0</option>
    <option value="EF1">EF1</option>
    <option value="EF2">EF2</option>
    <option value="EF3">EF3</option>
    <option value="EF4">EF4</option>
    <option value="EF5">EF5</option>

    <option value="FU">FU</option>
    <option value="F0">F0</option>
    <option value="F1">F1</option>
    <option value="F2">F2</option>
    <option value="F3">F3</option>
    <option value="F4">F4</option>
    <option value="F5">F5</option>

    <option value="F0*">F0* (Blue Ayanami rating)</option>
    <option value="F1*">F1* (Blue Ayanami rating)</option>
    <option value="F2*">F2* (Blue Ayanami rating)</option>
    <option value="F3*">F3* (Blue Ayanami rating)</option>
    <option value="F4*">F4* (Blue Ayanami rating)</option>
    <option value="F5*">F5* (Blue Ayanami rating)</option>

    <option value="IFU">IFU</option>
    <option value="IF0">IF0</option>
    <option value="IF1">IF1</option>
    <option value="IF2">IF2</option>
    <option value="IF3">IF3</option>
    <option value="IF4">IF4</option>
    <option value="IF5">IF5</option>
  </select>

  <button onclick="createTornado()">Submit</button>
  <button onclick="closeForm()">Cancel</button>
</div>

<script type="module">
import { supabase } from './supabase.js';

let currentUser = null;

async function updateAuthUI() {
  const { data: { user } } = await supabase.auth.getUser();
  currentUser = user;

  const guestPopup = document.getElementById("guestPopup");

  if (!currentUser) {
    if (guestPopup) guestPopup.style.display = "flex";
  } else {
    if (guestPopup) guestPopup.style.display = "none";
  }
}

async function initAuth() {
  const { data: { session } } = await supabase.auth.getSession();
  const user = session?.user ?? null;

  currentUser = user;

  const guestPopup = document.getElementById("guestPopup");
  if (!guestPopup) return;

  guestPopup.style.display = user ? "none" : "flex";
}

function normalizeStates(t) {
  if (Array.isArray(t.states)) return t.states;

  if (typeof t.states === "string") {
    return t.states.split("-").map(s => s.trim());
  }

  if (typeof t.state === "string") {
    return t.state.split("-").map(s => s.trim());
  }

  return [];
}

function showUsernamePopup(user) {
  if (document.getElementById("usernamePopup")) return;

  document.body.insertAdjacentHTML("beforeend", `
    <div id="usernamePopup" style="
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.75);
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:9999;
    ">
      <div style="
        background:#1f2937;
        padding:30px;
        border-radius:16px;
        width:400px;
        text-align:center;
      ">
        <h2>Create Username</h2>

        <input
          id="newUsername"
          placeholder="Choose username"
          style="width:100%;padding:12px;margin-top:12px;border-radius:8px;background:#111827;color:white;"
        />

        <button onclick="saveUsername('${user.id}')" style="width:100%;margin-top:14px;padding:12px;">
          Save Username
        </button>
      </div>
    </div>
  `);
}

window.openRandomTornado = function () {
  if (!allTornadoes.length) {
    alert("No tornadoes loaded.");
    return;
  }

  const random =
    allTornadoes[Math.floor(Math.random() * allTornadoes.length)];

  location.href = "tornado.html?id=" + random.id;
};

window.saveUsername = async function (userId) {
  const username = document.getElementById("newUsername").value.trim();

  if (!username) {
    alert("Username required.");
    return;
  }

  const { error } = await supabase.from("profiles").insert([{
    id: userId,
    username
  }]);

  if (error) {
    alert(error.message);
    return;
  }

  document.getElementById("usernamePopup").remove();
  initAuth();
};

let allTornadoes = [];

function getEFColor(intensity) {
  if (!intensity) return "#9ca3af"; // fallback gray

  const i = intensity.toString().toUpperCase();

  // U / unknown intensity
  if (i.includes("UF") || i === "U" || i.includes("UNK") || i.includes("EFU")) {
    return "#9ca3af"; // gray
  }

  // EF0 → light blue
  if (i.includes("0")) {
    return "#38bdf8"; // light blue
  }

  // EF1 → green
  if (i.includes("1")) {
    return "#22c55e"; // green
  }

  // EF2+
  if (i.includes("2")) return "#facc15"; // yellow
  if (i.includes("3")) return "#fb923c"; // orange
  if (i.includes("4")) return "#ef4444"; // red
  if (i.includes("5")) return "#a855f7"; // purple

  return "#9ca3af";
}

/* =========================
   FIXED INTENSITY HANDLER
========================= */
function formatIntensity(i) {
  if (!i) return "Unknown";

  if (typeof i === "string") return i;

  const scale = i.scale ?? "EF";
  const rating = i.rating ?? "";
  const mod = i.modifier ?? "";

  return `${scale}${rating}${mod}`;
}

function intensityValue(i) {
  if (!i) return 0;

  if (typeof i === "string") {
    return parseInt(i.replace(/\D/g, "")) || 0;
  }

  const base =
    i.scale === "EF" ? 0 :
    i.scale === "F" ? 100 :
    i.scale === "IF" ? 200 : 0;

  const rating = Number(i.rating ?? 0);

  const mod =
    i.modifier === "+" ? 0.3 :
    i.modifier === "-" ? -0.3 : 0;

  return base + rating + mod;
}

async function loadTornadoes() {
  const { data } = await supabase
    .from("tornadoes")
    .select("*")
    .eq("status", "approved");

  allTornadoes = data || [];
  document.getElementById("totalCount").innerText = allTornadoes.length;

  const { count } = await supabase
    .from("uploads")
    .select("*", { count: "exact", head: true })
    .eq("status", "approved");

  document.getElementById("uploadCount").innerText = count || 0;

  populateFilters();
  applyFilters();
}

function populateFilters() {
  const years = [...new Set(allTornadoes.map(t => t.date?.split("-")[0]))].filter(Boolean);
  const states = [...new Set(
    allTornadoes.flatMap(t => normalizeStates(t))
  )].filter(Boolean);

  document.getElementById("yearFilter").innerHTML =
    '<option value="">All Years</option>' +
    years.map(y => `<option>${y}</option>`).join("");

  document.getElementById("stateFilter").innerHTML =
    '<option value="">All States</option>' +
    states.map(s => `<option>${s}</option>`).join("");

  document.getElementById("intensityFilter").innerHTML =
    '<option value="">All Intensities</option>' +
    [...new Set(allTornadoes.map(t => formatIntensity(t.intensity)))]
      .map(i => `<option>${i}</option>`).join("");
}

window.goProfile = function () {
  location.href = "profile.html";
};

window.applyFilters = function () {
  let filtered = [...allTornadoes];

  const search = document.getElementById("searchInput").value.toLowerCase();
  const intensity = document.getElementById("intensityFilter").value;
  const year = document.getElementById("yearFilter").value;
  const state = document.getElementById("stateFilter").value;
  const sort = document.getElementById("sortFilter").value;

  filtered = filtered.filter(t => {
    return (
      (!search || (t.name||"").toLowerCase().includes(search) || (t.state||"").toLowerCase().includes(search)) &&
      (!intensity || formatIntensity(t.intensity) === intensity) &&
      (!year || t.date?.startsWith(year)) &&
      (!state || normalizeStates(t).includes(state))
    );
  });

  if (sort === "newest") filtered.sort((a,b)=>new Date(b.date)-new Date(a.date));
  if (sort === "oldest") filtered.sort((a,b)=>new Date(a.date)-new Date(b.date));
  if (sort === "strongest") filtered.sort((a,b)=>intensityValue(b.intensity)-intensityValue(a.intensity));
  if (sort === "weakest") filtered.sort((a,b)=>intensityValue(a.intensity)-intensityValue(b.intensity));

  document.getElementById("list").innerHTML = filtered.map(t => `
    <div class="card" onclick="openTornado('${t.id}')">
      <h2>${t.name}</h2>
      <p>
        <b>States:</b>
        ${normalizeStates(t).join(" - ") || "N/A"}
      </p>
      <p><b>Date:</b> ${t.date || "N/A"}</p>
      <p>
        <b>Intensity:</b>
        <span style="color:${getEFColor(t.intensity)}; font-weight:bold;">
          ${formatIntensity(t.intensity)}
        </span>
      </p>
    </div>
  `).join("");
};

window.openTornado = id => location.href = 'tornado.html?id=' + id;

window.openForm = async () => {
  document.getElementById("formBox").style.display = "block";
};

window.closeForm = () => document.getElementById("formBox").style.display = "none";

window.continueGuest = function () {
  document.getElementById("guestPopup").style.display = "none";
};

window.createTornado = async function () {
  const name = document.getElementById("name").value;
  const state = document.getElementById("state").value;
  const date = document.getElementById("date").value;
  const intensity = document.getElementById("intensity").value;

  const { data: { user } } = await supabase.auth.getUser();

  let submittedBy = "Anonymous";

  if (user) {
    const { data: profile } = await supabase
      .from("profiles")
      .select("username")
      .eq("id", user.id)
      .single();

    submittedBy = profile?.username || "Anonymous";
  }

  const { error } = await supabase.from("tornadoes").insert([{
    name,
    states: state.split("-").map(s => s.trim()),
    date,
    intensity,
    status: "pending",
    submitted_by: submittedBy
  }]);

  if (error) {
    console.error(error);
    alert("Error: " + error.message);
    return;
  }

  alert("Submitted!");
  closeForm();
  loadTornadoes(); // refresh list immediately
};

loadTornadoes();
initAuth();

supabase.auth.onAuthStateChange(() => {
  initAuth();
});

</script>
<footer>
  <p>© 2026 utwx</p>
</footer>
</body>
</html>
