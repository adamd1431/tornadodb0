<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tornado Database</title>

  <style>
    body {
      margin: 0;
      padding: 25px;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #111827, #0b1220);
      color: white;
      min-height: 100vh;
    }

    h1 {
      text-align: center;
      font-size: 52px;
      margin-bottom: 20px;
      letter-spacing: 1px;
      text-shadow: 0 0 20px rgba(59,130,246,0.4);
    }

    button {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 8px 20px rgba(37,99,235,0.25);
      transition: 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(37,99,235,0.4);
    }

    input, select {
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #374151;
      background: rgba(17,24,39,0.8);
      color: white;
      box-sizing: border-box;
      outline: none;
    }

    .nav {
      position: fixed;
      top: 15px;
      left: 15px;
      right: 15px;
      display: flex;
      justify-content: space-between;
      z-index: 999;
      pointer-events: none; /* allows inner buttons only */
    }

    .nav-left,
    .nav-right {
      display: flex;
      gap: 10px;
      pointer-events: auto;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 25px;
      justify-content: center;
      padding: 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid #1f2937;
      border-radius: 14px;
    }

    .searchBar {
      width: 100%;
      max-width: 520px;
      margin: 0 auto 20px auto;
      display: block;
      font-size: 16px;
      border-radius: 12px;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 18px;
      margin: 14px 0;
      cursor: pointer;
      transition: 0.25s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: #3b82f6;
    }

    .formBox {
      display: none;
      position: fixed;
      top: 15%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(31,41,55,0.95);
      border: 1px solid #374151;
      padding: 25px;
      border-radius: 16px;
      width: 360px;
      z-index: 1000;
    }

    .rating {
      color: #fbbf24;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div id="guestPopup" style="
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5000;
    ">
      <div style="
        background: #1f2937;
        padding: 30px;
        border-radius: 18px;
        width: 400px;
        max-width: 90%;
        text-align: center;
        border: 1px solid #374151;
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      ">
        <h2 style="margin-top:0;">Browsing as Guest</h2>

        <p style="color:#cbd5e1;">
          You are currently browsing as a guest.
          Sign in to upload tornadoes and access account features.
        </p>

      <div style="display:flex; gap:10px; justify-content:center; margin-top:20px;">
        <button onclick="location.href='login.html'">Sign In</button>
        <button onclick="continueGuest()">Continue as Guest</button>
      </div>
    </div>
  </div>

<div class="nav">
  <div class="nav-left">
    <button onclick="location.href='admin.html'">Admin</button>
    <button onclick="openForm()">+ Add Tornado</button>
  </div>

  <div class="nav-right">
    <button onclick="goProfile()">Profile</button>
  </div>
</div>

<h1>🌪 Tornado Database</h1>

<input id="searchInput" class="searchBar" placeholder="Search..." oninput="applyFilters()" />

<div class="filters">
  <select id="intensityFilter" onchange="applyFilters()">
    <option value="">All Intensities</option>
  </select>

  <select id="yearFilter" onchange="applyFilters()">
    <option value="">All Years</option>
  </select>

  <select id="stateFilter" onchange="applyFilters()">
    <option value="">All States</option>
  </select>

  <select id="sortFilter" onchange="applyFilters()">
    <option value="newest">Newest</option>
    <option value="oldest">Oldest</option>
    <option value="strongest">Strongest</option>
    <option value="weakest">Weakest</option>
  </select>
</div>

<div id="list">Loading...</div>

<div id="formBox" class="formBox">
  <h2>Add Tornado</h2>

  <input id="name" placeholder="Name"><br><br>
  <input id="state" placeholder="State"><br><br>
  <input id="date" type="date"><br><br>

  <select id="intensity">
    <option value="EFU">EFU</option>
    <option value="EF0">EF0</option>
    <option value="EF1">EF1</option>
    <option value="EF2">EF2</option>
    <option value="EF3">EF3</option>
    <option value="EF4">EF4</option>
    <option value="EF5">EF5</option>

    <option value="FU">FU</option>
    <option value="F0">F0</option>
    <option value="F1">F1</option>
    <option value="F2">F2</option>
    <option value="F3">F3</option>
    <option value="F4">F4</option>
    <option value="F5">F5</option>

    <option value="IFU">IFU</option>
    <option value="IF0">IF0</option>
    <option value="IF1">IF1</option>
    <option value="IF2">IF2</option>
    <option value="IF3">IF3</option>
    <option value="IF4">IF4</option>
    <option value="IF5">IF5</option>
  </select>

  <button onclick="createTornado()">Submit</button>
  <button onclick="closeForm()">Cancel</button>
</div>

<script type="module">
import { supabase } from './supabase.js';

let currentUser = null;

async function initAuth() {
  const { data } = await supabase.auth.getUser();
  currentUser = data.user;

  if (currentUser) {
    const { data: profile } = await supabase
      .from("profiles")
      .select("*")
      .eq("id", currentUser.id)
      .maybeSingle();

    if (!profile) {
      document.body.insertAdjacentHTML("beforeend", `
        <div id="usernamePopup" style="
          position:fixed;
          inset:0;
          background:rgba(0,0,0,0.75);
          display:flex;
          justify-content:center;
          align-items:center;
          z-index:9999;
        ">
          <div style="
            background:#1f2937;
            padding:30px;
            border-radius:16px;
            width:400px;
            max-width:90%;
            text-align:center;
            border:1px solid #374151;
          ">
            <h2>Create Username</h2>

            <p style="color:#cbd5e1;">
              Choose a username to finish setup.
            </p>

            <input
              id="newUsername"
              placeholder="Choose username"
              style="width:100%;padding:12px;margin-top:12px;border-radius:8px;border:1px solid #374151;background:#111827;color:white;box-sizing:border-box;"
            />

            <button onclick="saveUsername()" style="width:100%;margin-top:14px;padding:12px;">
              Save Username
            </button>
          </div>
        </div>
      `);
    }
  }
}

window.saveUsername = async function () {
  const input = document.getElementById("newUsername");

  if (!input) {
    alert("Input not found (popup not loaded properly).");
    return;
  }

  const username = input.value.trim();

  if (username.length === 0) {
    alert("Username required.");
    return;
  }

  const { data: existing } = await supabase
    .from("profiles")
    .select("username")
    .eq("username", username)
    .maybeSingle();

  if (existing) {
    alert("Username already taken.");
    return;
  }

  const { error } = await supabase.from("profiles").insert([{
    id: currentUser.id,
    username,
    email: currentUser.email ?? null
  }]);

  if (error) {
    alert(error.message);
    return;
  }

  document.getElementById("usernamePopup").remove();
  alert("Username saved!");
};

let allTornadoes = [];

/* =========================
   FIXED INTENSITY HANDLER
========================= */
function formatIntensity(i) {
  if (!i) return "Unknown";

  if (typeof i === "string") return i;

  const scale = i.scale ?? "EF";
  const rating = i.rating ?? "";
  const mod = i.modifier ?? "";

  return `${scale}${rating}${mod}`;
}

function intensityValue(i) {
  if (!i) return 0;

  if (typeof i === "string") {
    return parseInt(i.replace(/\D/g, "")) || 0;
  }

  const base =
    i.scale === "EF" ? 0 :
    i.scale === "F" ? 100 :
    i.scale === "IF" ? 200 : 0;

  const rating = Number(i.rating ?? 0);

  const mod =
    i.modifier === "+" ? 0.3 :
    i.modifier === "-" ? -0.3 : 0;

  return base + rating + mod;
}

async function loadTornadoes() {
  const { data } = await supabase
    .from("tornadoes")
    .select("*")
    .eq("status", "approved");

  allTornadoes = data || [];

  populateFilters();
  applyFilters();
}

function populateFilters() {
  const years = [...new Set(allTornadoes.map(t => t.date?.split("-")[0]))].filter(Boolean);
  const states = [...new Set(allTornadoes.map(t => t.state))].filter(Boolean);

  document.getElementById("yearFilter").innerHTML =
    '<option value="">All Years</option>' +
    years.map(y => `<option>${y}</option>`).join("");

  document.getElementById("stateFilter").innerHTML =
    '<option value="">All States</option>' +
    states.map(s => `<option>${s}</option>`).join("");

  document.getElementById("intensityFilter").innerHTML =
    '<option value="">All Intensities</option>' +
    [...new Set(allTornadoes.map(t => formatIntensity(t.intensity)))]
      .map(i => `<option>${i}</option>`).join("");
}

window.goProfile = function () {
  location.href = "profile.html";
};

window.applyFilters = function () {
  let filtered = [...allTornadoes];

  const search = document.getElementById("searchInput").value.toLowerCase();
  const intensity = document.getElementById("intensityFilter").value;
  const year = document.getElementById("yearFilter").value;
  const state = document.getElementById("stateFilter").value;
  const sort = document.getElementById("sortFilter").value;

  filtered = filtered.filter(t => {
    return (
      (!search || (t.name||"").toLowerCase().includes(search) || (t.state||"").toLowerCase().includes(search)) &&
      (!intensity || formatIntensity(t.intensity) === intensity) &&
      (!year || t.date?.startsWith(year)) &&
      (!state || t.state === state)
    );
  });

  if (sort === "newest") filtered.sort((a,b)=>new Date(b.date)-new Date(a.date));
  if (sort === "oldest") filtered.sort((a,b)=>new Date(a.date)-new Date(b.date));
  if (sort === "strongest") filtered.sort((a,b)=>intensityValue(b.intensity)-intensityValue(a.intensity));
  if (sort === "weakest") filtered.sort((a,b)=>intensityValue(a.intensity)-intensityValue(b.intensity));

  document.getElementById("list").innerHTML = filtered.map(t => `
    <div class="card" onclick="openTornado('${t.id}')">
      <h2>${t.name}</h2>
      <p><b>State:</b> ${t.state || "N/A"}</p>
      <p><b>Date:</b> ${t.date || "N/A"}</p>
      <p><b>Intensity:</b> <span class="rating">${formatIntensity(t.intensity)}</span></p>
    </div>
  `).join("");
};

window.openTornado = id => location.href = 'tornado.html?id=' + id;

window.openForm = () => {
  if (!currentUser) {
    alert("Please sign in to add tornadoes.");
    location.href = "login.html";
    return;
  }

  document.getElementById("formBox").style.display = "block";
};

window.closeForm = () => document.getElementById("formBox").style.display = "none";

window.continueGuest = function () {
  document.getElementById("guestPopup").style.display = "none";
};

window.createTornado = async function () {
  const name = document.getElementById("name").value;
  const state = document.getElementById("state").value;
  const date = document.getElementById("date").value;
  const intensity = document.getElementById("intensity").value;

  await supabase.from("tornadoes").insert([{
    name, state, date, intensity, status: "pending"
  }]);

  alert("Submitted!");
  closeForm();
};

loadTornadoes();

initAuth();
</script>

</body>
</html>
