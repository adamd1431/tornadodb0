<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tornado Database</title>

<style>
body {
  margin: 0;
  padding: 30px;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background: #0b1220;
  color: #e5e7eb;
}

/* HEADER */
h1 {
  text-align: center;
  font-size: 44px;
  margin-bottom: 20px;
  letter-spacing: 1px;
}

/* TOP NAV */
.nav {
  position: fixed;
  top: 15px;
  right: 15px;
  display: flex;
  gap: 10px;
}

/* BUTTONS */
button {
  background: #1f6feb;
  color: white;
  border: none;
  padding: 10px 14px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 600;
  transition: 0.2s ease;
}

button:hover {
  background: #155ac7;
  transform: translateY(-1px);
}

/* INPUTS */
input, select {
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #263042;
  background: #0f172a;
  color: #e5e7eb;
  outline: none;
}

/* SEARCH */
.searchBar {
  width: 100%;
  max-width: 520px;
  margin: 0 auto 20px auto;
  display: block;
}

/* FILTERS */
.filters {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 12px;
  margin-bottom: 25px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.03);
  border: 1px solid #1f2937;
  border-radius: 14px;
  padding: 18px;
  margin: 14px auto;
  max-width: 700px;
  cursor: pointer;
  transition: 0.2s ease;
}

.card:hover {
  border-color: #3b82f6;
  transform: translateY(-2px);
}

/* INTENSITY */
.rating {
  color: #fbbf24;
  font-weight: 700;
}

/* FORM */
.formBox {
  display: none;
  position: fixed;
  top: 15%;
  left: 50%;
  transform: translateX(-50%);
  background: #0f172a;
  border: 1px solid #1f2937;
  padding: 22px;
  border-radius: 14px;
  width: 360px;
  z-index: 1000;
}

/* subtle divider feel */
hr {
  border: none;
  border-top: 1px solid #1f2937;
  margin: 20px 0;
}
</style>
</head>

<body>

<div class="nav">
  <button onclick="location.href='admin.html'">Admin</button>
  <button onclick="openForm()">+ Add Tornado</button>
</div>

<h1>🌪 Tornado Database</h1>

<input id="searchInput" class="searchBar" placeholder="Search tornadoes..." oninput="applyFilters()" />

<div class="filters">
  <select id="intensityFilter" onchange="applyFilters()">
    <option value="">All Intensities</option>
  </select>

  <select id="yearFilter" onchange="applyFilters()">
    <option value="">All Years</option>
  </select>

  <select id="stateFilter" onchange="applyFilters()">
    <option value="">All States</option>
  </select>

  <select id="sortFilter" onchange="applyFilters()">
    <option value="newest">Newest</option>
    <option value="oldest">Oldest</option>
    <option value="strongest">Strongest</option>
    <option value="weakest">Weakest</option>
  </select>
</div>

<div id="list">Loading...</div>

<!-- FORM -->
<div id="formBox" class="formBox">
  <h2>Add Tornado</h2>

  <input id="name" placeholder="Name"><br><br>
  <input id="state" placeholder="State"><br><br>
  <input id="date" type="date"><br><br>

  <select id="intensity">
    <option>EF0</option><option>EF1</option><option>EF2</option>
    <option>EF3</option><option>EF4</option><option>EF5</option>
  </select><br><br>

  <button onclick="createTornado()">Submit</button>
  <button onclick="closeForm()">Cancel</button>
</div>

<script type="module">
import { supabase } from './supabase.js';

let allTornadoes = [];

/* SAFE INTENSITY */
function formatIntensity(i) {
  if (!i) return "Unknown";
  if (typeof i === "string") return i;

  const scale = i.scale || "";
  const rating = i.rating ?? "";
  const mod = i.modifier || "";

  return `${scale}${rating}${mod}` || "Unknown";
}

/* SORT VALUE */
function intensityValue(i) {
  if (!i) return 0;

  if (typeof i === "string") {
    return parseInt(i.replace(/\D/g, "")) || 0;
  }

  const base =
    i.scale === "EF" ? 0 :
    i.scale === "F" ? 100 :
    i.scale === "IF" ? 200 : 0;

  const rating = Number(i.rating || 0);

  const mod =
    i.modifier === "+" ? 0.3 :
    i.modifier === "-" ? -0.3 : 0;

  return base + rating + mod;
}

async function loadTornadoes() {
  const { data } = await supabase
    .from("tornadoes")
    .select("*")
    .eq("status", "approved");

  allTornadoes = data || [];

  populateFilters();
  applyFilters();
}

function populateFilters() {
  const years = [...new Set(allTornadoes.map(t => t.date?.split("-")[0]))].filter(Boolean);
  const states = [...new Set(allTornadoes.map(t => t.state))].filter(Boolean);

  document.getElementById("yearFilter").innerHTML =
    '<option value="">All Years</option>' +
    years.map(y => `<option>${y}</option>`).join("");

  document.getElementById("stateFilter").innerHTML =
    '<option value="">All States</option>' +
    states.map(s => `<option>${s}</option>`).join("");
}

window.applyFilters = function () {
  let filtered = [...allTornadoes];

  const search = document.getElementById("searchInput").value.toLowerCase();
  const intensity = document.getElementById("intensityFilter").value;
  const year = document.getElementById("yearFilter").value;
  const state = document.getElementById("stateFilter").value;
  const sort = document.getElementById("sortFilter").value;

  filtered = filtered.filter(t => {
    const matchSearch =
      (t.name || "").toLowerCase().includes(search) ||
      (t.state || "").toLowerCase().includes(search);

    const matchIntensity =
      !intensity || formatIntensity(t.intensity) === intensity;

    const matchYear =
      !year || t.date?.startsWith(year);

    const matchState =
      !state || t.state === state;

    return matchSearch && matchIntensity && matchYear && matchState;
  });

  if (sort === "newest") filtered.sort((a,b)=>new Date(b.date)-new Date(a.date));
  if (sort === "oldest") filtered.sort((a,b)=>new Date(a.date)-new Date(b.date));
  if (sort === "strongest") filtered.sort((a,b)=>intensityValue(b.intensity)-intensityValue(a.intensity));
  if (sort === "weakest") filtered.sort((a,b)=>intensityValue(a.intensity)-intensityValue(b.intensity));

  document.getElementById("list").innerHTML = filtered.map(t => `
    <div class="card" onclick="openTornado('${t.id}')">
      <h2>${t.name}</h2>
      <p><b>State:</b> ${t.state || "N/A"}</p>
      <p><b>Date:</b> ${t.date || "N/A"}</p>
      <p><b>Intensity:</b> <span class="rating">${formatIntensity(t.intensity)}</span></p>
    </div>
  `).join("");
};

window.openTornado = id => location.href = 'tornado.html?id=' + id;

window.openForm = () => document.getElementById("formBox").style.display = "block";
window.closeForm = () => document.getElementById("formBox").style.display = "none";

window.createTornado = async function () {
  const name = document.getElementById("name").value;
  const state = document.getElementById("state").value;
  const date = document.getElementById("date").value;
  const intensity = document.getElementById("intensity").value;

  await supabase.from("tornadoes").insert([{
    name,
    state,
    date,
    intensity,
    status: "pending"
  }]);

  alert("Submitted!");
  closeForm();
};

loadTornadoes();
</script>

</body>
</html>
