<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tornado Database</title>

  <style>
    body {
      margin: 0;
      padding: 25px;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #111827, #0b1220);
      color: white;
      min-height: 100vh;
    }

    h1 {
      text-align: center;
      font-size: 52px;
      margin-bottom: 20px;
      letter-spacing: 1px;
      text-shadow: 0 0 20px rgba(59,130,246,0.4);
    }

    button {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 8px 20px rgba(37,99,235,0.25);
      transition: 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(37,99,235,0.4);
    }

    input, select {
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #374151;
      background: rgba(17,24,39,0.8);
      color: white;
      box-sizing: border-box;
      outline: none;
      transition: 0.2s;
    }

    input:focus, select:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }

    .nav {
      position: fixed;
      top: 15px;
      right: 15px;
      display: flex;
      gap: 10px;
      z-index: 999;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 25px;
      justify-content: center;
      padding: 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid #1f2937;
      border-radius: 14px;
      backdrop-filter: blur(10px);
    }

    .searchBar {
      width: 100%;
      max-width: 520px;
      margin: 0 auto 20px auto;
      display: block;
      font-size: 16px;
      border-radius: 12px;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 18px;
      margin: 14px 0;
      cursor: pointer;
      transition: 0.25s ease;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .card:hover {
      transform: translateY(-5px) scale(1.01);
      border-color: #3b82f6;
      box-shadow: 0 15px 35px rgba(59,130,246,0.25);
    }

    .formBox {
      display: none;
      position: fixed;
      top: 15%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(31,41,55,0.95);
      border: 1px solid #374151;
      padding: 25px;
      border-radius: 16px;
      width: 360px;
      z-index: 1000;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
    }

    .rating {
      color: #fbbf24;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(251,191,36,0.3);
    }
  </style>
</head>

<body>

<div class="nav">
  <button onclick="location.href='admin.html'">Admin</button>
  <button onclick="openForm()">+ Add Tornado</button>
</div>

<h1>🌪 Tornado Database</h1>

<input id="searchInput" class="searchBar" placeholder="Search..." oninput="applyFilters()" />

<div class="filters">
  <select id="intensityFilter" onchange="applyFilters()">
    <option value="">All Intensities</option>
  </select>

  <select id="yearFilter" onchange="applyFilters()">
    <option value="">All Years</option>
  </select>

  <select id="stateFilter" onchange="applyFilters()">
    <option value="">All States</option>
  </select>

  <select id="sortFilter" onchange="applyFilters()">
    <option value="newest">Newest</option>
    <option value="oldest">Oldest</option>
    <option value="strongest">Strongest</option>
    <option value="weakest">Weakest</option>
  </select>
</div>

<div id="list">Loading...</div>

<div id="formBox" class="formBox">
  <h2>Add Tornado</h2>

  <input id="name" placeholder="Name"><br><br>
  <input id="state" placeholder="State"><br><br>
  <input id="date" type="date"><br><br>

  <select id="intensity">
    <option>EF0</option><option>EF1</option><option>EF2</option>
    <option>EF3</option><option>EF4</option><option>EF5</option>
  </select><br><br>

  <button onclick="createTornado()">Submit</button>
  <button onclick="closeForm()">Cancel</button>
</div>

<script type="module">
import { supabase } from './supabase.js';

let allTornadoes = [];

function formatIntensity(i) {
  if (!i) return "Unknown";
  if (typeof i === "string") return i;
  return `${i.scale || ""}${i.rating ?? ""}${i.modifier || ""}`;
}

function intensityValue(i) {
  if (!i) return 0;
  if (typeof i === "string") return parseInt(i.replace(/\D/g, "")) || 0;

  return (i.scale === "EF" ? 0 :
          i.scale === "F" ? 100 :
          i.scale === "IF" ? 200 : 0)
          + (i.rating || 0)
          + (i.modifier === "+" ? 0.3 : i.modifier === "-" ? -0.3 : 0);
}

async function loadTornadoes() {
  const { data } = await supabase
    .from("tornadoes")
    .select("*")
    .eq("status", "approved");

  allTornadoes = data || [];
  populateFilters();
  applyFilters();
}

function populateFilters() {
  const years = [...new Set(allTornadoes.map(t => t.date?.split("-")[0]))].filter(Boolean);
  const states = [...new Set(allTornadoes.map(t => t.state))].filter(Boolean);

  document.getElementById("yearFilter").innerHTML =
    '<option value="">All Years</option>' +
    years.map(y => `<option>${y}</option>`).join("");

  document.getElementById("stateFilter").innerHTML =
    '<option value="">All States</option>' +
    states.map(s => `<option>${s}</option>`).join("");

  document.getElementById("intensityFilter").innerHTML =
    '<option value="">All Intensities</option>' +
    [...new Set(allTornadoes.map(t => formatIntensity(t.intensity)))]
      .map(i => `<option>${i}</option>`).join("");
}

window.applyFilters = function () {
  let filtered = [...allTornadoes];

  const search = document.getElementById("searchInput").value.toLowerCase();
  const intensity = document.getElementById("intensityFilter").value;
  const year = document.getElementById("yearFilter").value;
  const state = document.getElementById("stateFilter").value;
  const sort = document.getElementById("sortFilter").value;

  filtered = filtered.filter(t => {
    return (
      (!search || (t.name||"").toLowerCase().includes(search) || (t.state||"").toLowerCase().includes(search)) &&
      (!intensity || formatIntensity(t.intensity) === intensity) &&
      (!year || t.date?.startsWith(year)) &&
      (!state || t.state === state)
    );
  });

  if (sort === "newest") filtered.sort((a,b)=>new Date(b.date)-new Date(a.date));
  if (sort === "oldest") filtered.sort((a,b)=>new Date(a.date)-new Date(b.date));
  if (sort === "strongest") filtered.sort((a,b)=>intensityValue(b.intensity)-intensityValue(a.intensity));
  if (sort === "weakest") filtered.sort((a,b)=>intensityValue(a.intensity)-intensityValue(b.intensity));

  document.getElementById("list").innerHTML = filtered.map(t => `
    <div class="card" onclick="openTornado('${t.id}')">
      <h2>${t.name}</h2>
      <p><b>State:</b> ${t.state || "N/A"}</p>
      <p><b>Date:</b> ${t.date || "N/A"}</p>
      <p><b>Intensity:</b> <span class="rating">${formatIntensity(t.intensity)}</span></p>
    </div>
  `).join("");
};

window.openTornado = id => location.href = 'tornado.html?id=' + id;

window.openForm = () => document.getElementById("formBox").style.display = "block";
window.closeForm = () => document.getElementById("formBox").style.display = "none";

window.createTornado = async function () {
  const name = document.getElementById("name").value;
  const state = document.getElementById("state").value;
  const date = document.getElementById("date").value;
  const intensity = document.getElementById("intensity").value;

  await supabase.from("tornadoes").insert([{
    name, state, date, intensity, status: "pending"
  }]);

  alert("Submitted!");
  closeForm();
};

loadTornadoes();
</script>

</body>
</html>
