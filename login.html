<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body {
      font-family: Arial;
      background: #111827;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #1f2937;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      background: #111827;
      color: white;
      border: 1px solid #374151;
      border-radius: 8px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .link {
      margin-top: 12px;
      font-size: 13px;
      color: #cbd5e1;
      cursor: pointer;
    }

    .link span {
      color: #60a5fa;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="box">
  <h2 id="title">Login</h2>

  <!-- LOGIN INPUT -->
  <input id="loginInput" placeholder="Email / Username">

  <!-- PASSWORD -->
  <input id="password" type="password" placeholder="Password">

  <!-- SIGNUP FIELDS -->
  <input id="username" placeholder="Username" style="display:none;">
  <input id="email" placeholder="Email (optional)" style="display:none;">

  <button id="mainBtn" onclick="submit()">Login</button>
  <button onclick="googleLogin()">Sign in with Google</button>

  <div class="link" id="toggleText">
    Don't have an account? <span onclick="switchMode()">Sign up</span>
  </div>
</div>

<script type="module">
import { supabase } from './supabase.js';

let mode = "login";

function switchMode() {
  mode = mode === "login" ? "signup" : "login";

  document.getElementById("title").innerText =
    mode === "login" ? "Login" : "Sign Up";

  document.getElementById("mainBtn").innerText =
    mode === "login" ? "Login" : "Sign Up";

  document.getElementById("loginInput").placeholder =
    mode === "login" ? "Email / Username" : "Not used in signup";

  document.getElementById("username").style.display =
    mode === "signup" ? "block" : "none";

  document.getElementById("email").style.display =
    mode === "signup" ? "block" : "none";

  document.getElementById("toggleText").innerHTML =
    mode === "login"
      ? `Don't have an account? <span onclick="switchMode()">Sign up</span>`
      : `Already have an account? <span onclick="switchMode()">Login</span>`;
}

window.switchMode = switchMode;

window.submit = async function () {
  const loginInput = document.getElementById("loginInput").value;
  const password = document.getElementById("password").value;

  /* ======================
     LOGIN MODE
  ====================== */
  if (mode === "login") {
    let email = loginInput;

    // If not email, treat as username
    if (!loginInput.includes("@")) {
      const { data: profile } = await supabase
        .from("profiles")
        .select("email")
        .eq("username", loginInput)
        .maybeSingle();

      if (!profile?.email) {
        return alert("No account found with that username");
      }

      email = profile.email;
    }

    const { error } = await supabase.auth.signInWithPassword({
      email,
      password
    });

    if (error) return alert(error.message);

    location.href = "index.html";
  }

  /* ======================
     SIGNUP MODE
  ====================== */
  if (mode === "signup") {
    const username = document.getElementById("username").value.trim();
    const email = document.getElementById("email").value.trim();

    if (!username) return alert("Username required");

    const { data: existing } = await supabase
      .from("profiles")
      .select("username")
      .eq("username", username)
      .maybeSingle();

    if (existing) return alert("Username already taken");

    const { error } = await supabase.auth.signUp({
      email: email || undefined,
      password
    });

    if (error) return alert(error.message);

    alert("Signup successful. If email was used, check inbox.");

    // NOTE: username must be saved after auth confirmation in index.js
  }
};

window.googleLogin = async function () {
  await supabase.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: window.location.origin + "/index.html"
    }
  });
};
</script>

</body>
</html>
