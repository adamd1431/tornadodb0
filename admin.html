<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>

  <style>
    body {
      margin: 0;
      padding: 25px;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #0f172a, #1f2937);
      color: white;
      min-height: 100vh;
    }

    h1 {
      text-align: center;
      font-size: 40px;
      margin-bottom: 25px;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      margin-right: 8px;
    }

    button:hover {
      background: #1d4ed8;
    }

    input {
      padding: 10px;
      width: 220px;
      border-radius: 8px;
      border: 1px solid #374151;
      background: #111827;
      color: white;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid #374151;
      border-radius: 14px;
      padding: 18px;
      margin: 15px 0;
    }

    img {
      max-width: 250px;
      border-radius: 10px;
      margin-top: 10px;
    }

    a {
      color: #93c5fd;
      word-break: break-word;
    }

    .homeBtn {
      position: fixed;
      top: 15px;
      right: 15px;
    }

    .loginScreen {
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, #0f172a, #1f2937);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .panel {
      display: none;
      max-width: 1000px;
      margin: auto;
    }

    .pendingBox {
      margin-top: 10px;
      padding: 10px;
      border: 1px dashed #fbbf24;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<button class="homeBtn" onclick="location.href='index.html'">⬅ Home</button>

<!-- LOGIN -->
<div id="loginBox" class="loginScreen">
  <h2>Admin Login</h2>

  <input type="password" id="adminPass" placeholder="Password">
  <br><br>
  <button onclick="checkLogin()">Enter</button>

  <p id="loginError" style="color:red;"></p>
</div>

<!-- PANEL -->
<div id="adminPanel" class="panel">

  <h1>🌪 Admin Dashboard</h1>

  <div style="text-align:center; margin-bottom:20px;">
    <button onclick="loadTornadoes()">Tornadoes</button>
    <button onclick="loadUploads()">Uploads</button>
  </div>

  <hr>

  <div id="panel">Loading...</div>
</div>

<script type="module">
import { supabase } from './supabase.js';

const ADMIN_PASSWORD = "tornado123";
let view = "tornadoes";

// LOGIN
window.checkLogin = function () {
  const pass = document.getElementById("adminPass").value;

  if (pass === ADMIN_PASSWORD) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
    loadTornadoes();
  } else {
    document.getElementById("loginError").innerText = "Wrong password";
  }
};

// LOAD TORNADOES
async function loadTornadoes() {
  view = "tornadoes";

  const { data } = await supabase
    .from("tornadoes")
    .select("*")
    .eq("status", "pending");

  document.getElementById("panel").innerHTML = data.map(t => `
    <div class="card">

      <h3>${t.name}</h3>

      <p><b>State:</b> ${t.state}</p>
      <p><b>Date:</b> ${t.date}</p>
      <p><b>Intensity:</b> ${t.intensity}</p>

      <p>${t.description || ""}</p>

      <!-- PENDING SUMMARY -->
      ${t.pending_description ? `
        <div class="pendingBox">
          <b>Pending Summary:</b>
          <p>${t.pending_description}</p>

          <button onclick="approveSummary('${t.id}')">
            Approve Summary
          </button>
        </div>
      ` : ""}

      <br>

      <button onclick="approve('tornado','${t.id}')">Approve Tornado</button>
      <button onclick="reject('tornado','${t.id}')">Reject</button>

    </div>
  `).join("");
}

// LOAD UPLOADS
async function loadUploads() {
  view = "uploads";

  const { data } = await supabase
    .from("uploads")
    .select(`
      *,
      tornadoes(name)
    `)
    .eq("status", "pending");

  document.getElementById("panel").innerHTML = data.map(u => `
    <div class="card">

      <p><b>Tornado:</b> ${u.tornadoes?.name || "Unknown"}</p>
      <p><b>Category:</b> ${u.category}</p>

      ${
        u.category === "sources"
          ? `<a href="${u.file_url}" target="_blank">${u.file_url}</a>`
          : `<img src="${u.file_url}">`
      }

      <br><br>

      <button onclick="approve('upload','${u.id}')">Approve</button>
      <button onclick="reject('upload','${u.id}')">Reject</button>

    </div>
  `).join("");
}

// APPROVE/REJECT NORMAL
window.approve = async function(type, id) {
  const table = type === "tornado" ? "tornadoes" : "uploads";

  await supabase.from(table)
    .update({ status: "approved" })
    .eq("id", id);

  refresh();
};

window.reject = async function(type, id) {
  const table = type === "tornado" ? "tornadoes" : "uploads";

  await supabase.from(table)
    .delete()
    .eq("id", id);

  refresh();
};

// APPROVE SUMMARY (NEW)
window.approveSummary = async function(id) {

  const { data } = await supabase
    .from("tornadoes")
    .select("pending_description")
    .eq("id", id)
    .single();

  if (!data?.pending_description) return;

  await supabase
    .from("tornadoes")
    .update({
      description: data.pending_description,
      pending_description: null
    })
    .eq("id", id);

  alert("Summary approved!");
  loadTornadoes();
};

// REFRESH
function refresh() {
  if (view === "tornadoes") loadTornadoes();
  else loadUploads();
}

window.loadTornadoes = loadTornadoes;
window.loadUploads = loadUploads;

</script>

</body>
</html>
