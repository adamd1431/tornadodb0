<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>

  <style>
    body {
      margin: 0;
      padding: 25px;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #0f172a, #1f2937);
      color: white;
      min-height: 100vh;
    }

    h1 {
      text-align: center;
      font-size: 40px;
      margin-bottom: 25px;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      margin-right: 8px;
    }

    button:hover {
      background: #1d4ed8;
    }

    input {
      padding: 10px;
      width: 220px;
      border-radius: 8px;
      border: 1px solid #374151;
      background: #111827;
      color: white;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid #374151;
      border-radius: 14px;
      padding: 18px;
      margin: 15px 0;
    }

    img {
      max-width: 250px;
      border-radius: 10px;
      margin-top: 10px;
    }

    a {
      color: #93c5fd;
      word-break: break-word;
    }

    .homeBtn {
      position: fixed;
      top: 15px;
      right: 15px;
    }

    .loginScreen {
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, #0f172a, #1f2937);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .panel {
      display: none;
      max-width: 1000px;
      margin: auto;
    }

    .pendingBox {
      margin-top: 10px;
      padding: 10px;
      border: 1px dashed #fbbf24;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<button class="homeBtn" onclick="location.href='index.html'">⬅ Home</button>

<!-- PANEL -->
<div id="adminPanel" class="panel">

  <h1>🌪 Admin Dashboard</h1>

  <div style="text-align:center; margin-bottom:20px;">
    <button onclick="loadTornadoes()">Tornadoes</button>
    <button onclick="loadUploads()">Uploads</button>
    <button onclick="loadSummaries()">Summaries</button>
  </div>

  <hr>

  <div id="panel">Loading...</div>
</div>

<script type="module">
import { supabase } from './supabase.js';

const ADMIN_EMAIL = "lazerbuffalo1431@gmail.com"; // replace with your actual account email
let view = "tornadoes";

async function loadSummaries() {
  view = "summaries";

  const { data } = await supabase
    .from("summary_submissions")
    .select("id, summary_text, tornado_id, tornadoes(name)")
    .eq("status", "pending");

  const safe = data || [];

  document.getElementById("panel").innerHTML =
    safe.length
      ? safe.map(s => `
        <div class="card">
          <p><b>Tornado ID:</b> ${s.tornado_id || "Unknown"}</p>
          <p>${s.summary_text}</p>

          <button onclick="approveSummarySubmission('${s.id}', '${s.tornado_id}', ${JSON.stringify(
            JSON.stringify(s.summary_text)
          )})">
            Approve
          </button>
        </div>
      `).join("")
      : "<p>No pending summaries.</p>";
}

async function checkAdmin() {
  const { data: { user } } = await supabase.auth.getUser();

  if (!user) {
    alert("Please sign in first.");
    location.href = "login.html";
    return;
  }

  if (user.email !== ADMIN_EMAIL) {
    document.body.innerHTML = `
      <div style="
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        font-family:Arial;
        color:white;
        background:linear-gradient(to bottom,#0f172a,#1f2937);
      ">
        <h1>Access Denied</h1>
      </div>
    `;
    return;
  }

  document.getElementById("adminPanel").style.display = "block";

  loadTornadoes();
}

// 🌪 LOAD TORNADOES
async function loadTornadoes() {
  view = "tornadoes";

  const { data } = await supabase
    .from("tornadoes")
    .select("*")
    .eq("status", "pending");

  const safe = data || [];

  document.getElementById("panel").innerHTML =
    safe.length ? safe.map(t => `
      <div class="card">

        <h3>${t.name || "Unnamed Tornado"}</h3>

        <p><b>State:</b> ${normalizeStates(t).join(" - ") || "N/A"}</p>
        <p><b>Date:</b> ${t.date || "N/A"}</p>
        <p><b>Intensity:</b> ${t.intensity || "N/A"}</p>

        <p>${t.description || ""}</p>

        <br>

        <button onclick="approve('tornado','${t.id}')">Approve Tornado</button>
        <button onclick="reject('tornado','${t.id}')">Reject</button>

      </div>
    `).join("")
    : "<p>No tornadoes found.</p>";
}

function normalizeStates(t) {
  if (Array.isArray(t.states)) return t.states;
  if (typeof t.states === "string") return t.states.split("-").map(s => s.trim());
  if (typeof t.state === "string") return t.state.split("-").map(s => s.trim());
  return [];
}

// 📸 LOAD UPLOADS
async function loadUploads() {
  view = "uploads";

  const { data } = await supabase
    .from("uploads")
    .select("*, tornadoes(name)");
    .eq("status", "pending");

  const safe = data || [];

  document.getElementById("panel").innerHTML =
    safe.length ? safe.map(u => `
      <div class="card">

        <p><b>Tornado:</b> ${u.tornadoes?.name || "Unknown"}</p>
        <p><b>Category:</b> ${u.category || "N/A"}</p>
        <p><b>Uploaded By:</b> ${u.uploaded_by || "Anonymous"}</p>

        ${
          u.category === "writeups"
            ? `<a href="${u.file_url}" target="_blank">${u.file_url}</a>`
            : /\.(jpg|jpeg|png|gif|webp)$/i.test(u.file_url)
              ? `<img src="${u.file_url}">`
              : `<a href="${u.file_url}" target="_blank">${u.file_url}</a>`
        }

        <br><br>

        <button onclick="approve('upload','${u.id}')">Approve</button>
        <button onclick="reject('upload','${u.id}')">Reject</button>

      </div>
    `).join("")
    : "<p>No uploads found.</p>";
}

// ✅ APPROVE / REJECT
window.approve = async function(type, id) {
  const table = type === "tornado" ? "tornadoes" : "uploads";

  await supabase.from(table)
    .update({ status: "approved" })
    .eq("id", id);

  refresh();
};

window.reject = async function(type, id) {
  const table = type === "tornado" ? "tornadoes" : "uploads";

  await supabase.from(table)
    .delete()
    .eq("id", id);

  refresh();
};

// 📝 APPROVE SUMMARY
window.approveSummarySubmission = async function(id, tornado_id, text) {
  text = JSON.parse(text);

  await supabase
    .from("tornadoes")
    .update({ description: text })
    .eq("id", tornado_id);

  await supabase
    .from("summary_submissions")
    .delete()
    .eq("id", id);

  alert("Summary approved");

  if (view === "summaries") loadSummaries();
};

// 🔄 REFRESH
function refresh() {
  if (view === "tornadoes") loadTornadoes();
  else if (view === "uploads") loadUploads();
  else if (view === "summaries") loadSummaries();
}

window.loadTornadoes = loadTornadoes;
window.loadUploads = loadUploads;
window.loadSummaries = loadSummaries;

window.addEventListener("DOMContentLoaded", async () => {
  try {
    await checkAdmin();
  } catch (err) {
    console.error(err);
    document.getElementById("panel").innerHTML =
      "<p style='color:red'>Error loading admin panel. Open console (F12) to see details.</p>";
  }
});

</script>

</body>
</html>
