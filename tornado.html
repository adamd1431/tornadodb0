<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>UTWX Tornado Archive</title>

  <style>
    :root {
      --bg0: #020617;
      --bg1: #0f172a;
      --bg2: #111827;

      --card: rgba(30, 41, 59, 0.65);
      --border: rgba(255,255,255,0.08);

      --text: #ffffff;
      --muted: #94a3b8;

      --blue: #3b82f6;
      --cyan: #22d3ee;
      --yellow: #facc15;
      --orange: #f97316;
      --red: #ef4444;
      --purple: #a855f7;
    }

    /* ===== BASE ===== */
    body {
      margin: 0;
      padding: 24px;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color: var(--text);
      min-height: 100vh;

      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.18), transparent 45%),
        radial-gradient(circle at top right, rgba(168,85,247,0.12), transparent 40%),
        radial-gradient(circle at bottom, rgba(239,68,68,0.10), transparent 50%),
        linear-gradient(180deg, var(--bg0), var(--bg1), var(--bg2));

      background-attachment: fixed;
    }

    * {
      box-sizing: border-box;
    }

    /* subtle glow overlay */
    body::before {
      content: "";
      position: fixed;
      inset: -200px;
      background: radial-gradient(circle, rgba(59,130,246,0.08), transparent 60%);
      z-index: -1;
    }

    /* ===== HEADER ===== */
    h1 {
      text-align: center;
      font-size: 44px;
      margin: 10px 0 6px;
      font-weight: 900;

      background: linear-gradient(90deg, var(--blue), var(--cyan), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ===== NAV BUTTON ===== */
    .topNav {
      position: fixed;
      top: 15px;
      right: 15px;
      z-index: 999;
    }

    button {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s ease;
      box-shadow: 0 10px 25px rgba(59,130,246,0.25);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 35px rgba(59,130,246,0.35);
    }

    /* ===== CARD ===== */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      margin: 16px 0;

      backdrop-filter: blur(14px);
      box-shadow: 0 12px 35px rgba(0,0,0,0.35);

      transition: 0.25s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: rgba(59,130,246,0.5);
      box-shadow: 0 18px 50px rgba(59,130,246,0.2);
    }

    /* ===== META SECTION ===== */
    .meta {
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .meta h2 {
      margin: 0;
      font-size: 26px;
    }

    .meta p {
      margin: 4px 0;
      color: var(--muted);
    }

    /* ===== TABS ===== */
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 18px 0;
    }

    .tab {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s ease;
      font-size: 14px;
    }

    .tab:hover {
      border-color: var(--blue);
      transform: translateY(-2px);
    }

    /* ===== IMAGES ===== */
    img {
      max-width: 260px;
      border-radius: 12px;
      margin: 8px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    /* ===== LINKS ===== */
    a {
      color: #93c5fd;
      word-break: break-word;
    }

    /* ===== INPUTS ===== */
    input, textarea {
      width: 100%;
      padding: 10px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(15,23,42,0.7);
      color: white;
      box-sizing: border-box;
      margin-top: 8px;
      outline: none;
    }

    textarea {
      min-height: 120px;
    }

    input:focus, textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }

    /* ===== PENDING BOX ===== */
    .pendingBox {
      margin-top: 15px;
      padding: 12px;
      border: 1px dashed #fbbf24;
      border-radius: 12px;
      background: rgba(250,204,21,0.05);
    }

    /* ===== INTENSITY BADGE ===== */
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
    }
  </style>
</head>

<body>

<div class="topNav">
  <button onclick="location.href='index.html'">⬅ Home</button>
</div>

<h1 id="title">Loading...</h1>

<!-- SUMMARY -->
<div id="summaryBox" class="card">
  Loading summary...
</div>

<!-- TABS -->
<div class="tabs">
  <button onclick="showTab('tornado_pics')">Tornado Pics</button>
  <button onclick="showTab('damage')">Damage</button>
  <button onclick="showTab('radar')">Radar</button>
  <button onclick="showTab('environment')">Environment</button>
  <button onclick="showTab('research')">Research / Survey</button>
  <button onclick="showTab('text_accounts')">Text / Newspapers / Accounts</button>
  <button onclick="showTab('misc')">Misc</button>
</div>

<!-- CONTENT -->
<div id="tabContainer">

  <div id="tornado_pics" class="tab">
    <h3>Tornado Pictures</h3>
    <input type="file" multiple onchange="uploadFiles(this,'photos')">
    <div id="tornado_picsContent"></div>
  </div>

  <div id="uploadStatus" style="
    margin-top:10px;
    font-weight:bold;
    color:#93c5fd;
  "></div>

  <div id="damage" class="tab" style="display:none;">
    <h3>Damage</h3>
    <input type="file" multiple onchange="uploadFiles(this,'damage')">
    <div id="damageContent"></div>
  </div>

  <div id="radar" class="tab" style="display:none;">
    <h3>Radar</h3>
    <input type="file" multiple onchange="uploadFiles(this,'radar')">
    <div id="radarContent"></div>
  </div>

  <div id="environment" class="tab" style="display:none;">
    <h3>Environment</h3>
    <input type="file" multiple onchange="uploadFiles(this,'environment')">
    <div id="environmentContent"></div>
  </div>

  <div id="research" class="tab" style="display:none;">
    <h3>Research</h3>
    <input type="file" multiple onchange="uploadFiles(this,'research')">
    <div id="researchContent"></div>
  </div>

  <div id="text_accounts" class="tab" style="display:none;">
    <h3>Text / Newspapers / Accounts</h3>
    <input type="file" multiple onchange="uploadFiles(this,'text_accounts')">
    <div id="text_accountsContent"></div>
  </div>

  <div id="misc" class="tab" style="display:none;">
    <h3>Misc</h3>
    <input type="file" multiple onchange="uploadFiles(this,'misc')">
    <div id="miscContent"></div>
  </div>

</div>

<script type="module">
import { supabase } from './supabase.js';

function getEFColor(intensity) {
  if (!intensity) return "#9ca3af"; // fallback gray

  const i = intensity.toString().toUpperCase();

  // U / unknown intensity
  if (i.includes("UF") || i === "U" || i.includes("UNK") || i.includes("EFU")) {
    return "#9ca3af"; // gray
  }

  // EF0 → light blue
  if (i.includes("0")) {
    return "#38bdf8"; // light blue
  }

  // EF1 → green
  if (i.includes("1")) {
    return "#22c55e"; // green
  }

  // EF2+
  if (i.includes("2")) return "#facc15"; // yellow
  if (i.includes("3")) return "#fb923c"; // orange
  if (i.includes("4")) return "#ef4444"; // red
  if (i.includes("5")) return "#a855f7"; // purple

  return "#9ca3af";
}

const id = new URLSearchParams(window.location.search).get("id");

if (!id) {
  document.getElementById("title").innerText = "No tornado selected";
  throw new Error("Missing ID");
}

// DEFAULT TAB
window.showTab = function(tab) {
  document.querySelectorAll(".tab").forEach(t => t.style.display = "none");
  const el = document.getElementById(tab);
  if (el) el.style.display = "block";
};

// FILE UPLOAD
window.uploadFiles = async function(input, category) {
  const files = Array.from(input.files);
  const total = files.length;

  if (total === 0) return;

  const statusBox = document.getElementById("uploadStatus");
  let uploaded = 0;

  statusBox.innerText = `Uploading: 0/${total}`;

  for (let file of files) {
    const path = `${Date.now()}-${file.name}`;

    const { error } = await supabase.storage
      .from("uploads")
      .upload(path, file);

    if (error) {
      console.error(error);
      continue;
    }

    const { data } = supabase.storage
      .from("uploads")
      .getPublicUrl(path);

    const { data: { user } } = await supabase.auth.getUser();

    let uploader = "Anonymous";

    if (user) {
      const { data: profile } = await supabase
        .from("profiles")
        .select("username")
        .eq("id", user.id)
        .maybeSingle();

      uploader = profile?.username || "Anonymous";
    }

    await supabase.from("uploads").insert({
      tornado_id: id,
      category,
      file_url: data.publicUrl,
      status: "pending",
      uploaded_by: uploader
    });

    uploaded++;
    statusBox.innerText = `Uploading: ${uploaded}/${total}`;
  }

  statusBox.innerText = `✅ Uploaded: ${uploaded}/${total}`;
};

// SOURCE
window.uploadWriteup = async function () {
  const link = document.getElementById("writeupLink").value.trim();
  if (!link) return;

  const { data: { user } } = await supabase.auth.getUser();

  let uploader = "Anonymous";

  if (user) {
    const { data: profile } = await supabase
      .from("profiles")
      .select("username")
      .eq("id", user.id)
      .single();

    uploader = profile?.username || "Anonymous";
  }

  await supabase.from("uploads").insert([{
    tornado_id: id,
    category: "writeups",
    file_url: link,
    uploaded_by: uploader,
    status: "pending"
  }]);

  alert("Writeup submitted for approval");
  document.getElementById("writeupLink").value = "";
};

window.submitSummary = async function () {
  const summary =
    document.getElementById("summaryInput").value.trim();

  if (!summary) {
    alert("Write a summary first.");
    return;
  }

  const { data: { user } } = await supabase.auth.getUser();

  if (!user) {
    alert("Please log in first.");
    return;
  }

  const { data, error } = await supabase
    .from("summary_submissions")
    .upsert(
      {
        tornado_id: id,
        user_id: user.id,
        summary_text: summary,
        status: "pending"
      },
      {
        onConflict: "tornado_id,user_id"
      }
    )
    .select();

  console.log("SUMMARY UPSERT RESULT:", data);
  console.log("SUMMARY UPSERT ERROR:", error);

  if (error) {
    alert("Error: " + error.message);
    return;
  }

  alert("Summary submitted!");
  location.reload();
};

// LOAD TORNADO
async function loadTornado() {
  const { data, error } = await supabase
    .from("tornadoes")
    .select("*")
    .eq("id", id)
    .single();

  if (error || !data) {
    document.getElementById("title").innerText = "Tornado not found";
    return;
  }

  document.getElementById("title").innerText = data.name;

  document.getElementById("summaryBox").innerHTML = `
    <h3>🌪 Tornado Information</h3>

    <div class="meta">
      <p><b>State:</b> ${(data.states || []).join(" - ") || "N/A"}</p>
      <p><b>Date:</b> ${data.date || "N/A"}</p>
      <p>
        <b>Intensity:</b>
        <span style="color:${getEFColor(data.intensity)};font-weight:bold">
          ${data.intensity || "N/A"}
        </span>
      </p>
    </div>

    <hr style="border:1px solid #374151; margin:20px 0;">

    <h3>Summary</h3>
    ${data.description ? `<p>${data.description}</p>` : "<p>No summary yet.</p>"}

    <div style="margin-top:15px;">
      <h3>Add Summary</h3>
      <textarea id="summaryInput" placeholder="Write a tornado summary..."></textarea>
      <button onclick="submitSummary()">Submit Summary</button>
    </div>

    <hr style="border:1px solid #374151; margin:20px 0;">

    <div id="writeupsBox"></div>

    <div style="margin-top:15px;">
      <h3>Add Writeup</h3>
      <input id="writeupLink" placeholder="Paste link here">
      <button onclick="uploadWriteup()">Add Writeup</button>
    </div>

    ${data.pending_description ? `
      <div class="pendingBox" style="margin-top:20px;">
        <b>Pending Summary:</b>
        <p>${data.pending_description}</p>
        <small style="color:#fbbf24;">Awaiting admin approval</small>
      </div>
    ` : ""}
  `;

  loadUploads();
  loadWriteups(id);
}

// LOAD UPLOADS
async function loadUploads() {
  const { data } = await supabase
    .from("uploads")
    .select("*")
    .eq("tornado_id", id)
    .eq("status", "approved");

  const safeData = data || [];

  const map = {
    tornado_pics: "photos",
    damage: "damage",
    radar: "radar",
    environment: "environment",
    research: "research",
    text_accounts: "text_accounts",
    misc: "misc"
  };

  Object.entries(map).forEach(([tab, cat]) => {
    const el = document.getElementById(tab + "Content");
    if (!el) return;

    const items = safeData.filter(i => i.category === cat);

    el.innerHTML = items.length ? "" : "<p>No uploads</p>";

    items.forEach(i => {
      if (tab === "writeups") {
        el.innerHTML += `<a href="${i.file_url}" target="_blank">${i.file_url}</a><br>`;
      } else {
        el.innerHTML += `
          <img
            src="${i.file_url}"
            onclick="showUploader('${i.uploaded_by || "Anonymous"}')"
            style="cursor:pointer;"
          >
        `;
      }
    });
  });
}

async function loadWriteups(tornadoId) {
  const { data, error } = await supabase
    .from("uploads")
    .select("*")
    .eq("tornado_id", tornadoId)
    .eq("category", "writeups")
    .eq("status", "approved");

  const box = document.getElementById("writeupsBox");

  if (error || !data || data.length === 0) {
    box.innerHTML = "<h3>Writeups</h3><p>None</p>";
    return;
  }

  box.innerHTML = `
    <h3>Writeups</h3>
    ${data.map(w => `
      <div style="
        margin-bottom:15px;
        padding:10px;
        border:1px solid #374151;
        border-radius:10px;
        background:rgba(255,255,255,0.03);
      ">

        <a href="${w.file_url}" target="_blank" style="color:#60a5fa;">
          Open Writeup
        </a>

        <div style="margin-top:10px;">
          <iframe
            src="${w.file_url}"
            style="width:100%;height:300px;border:none;border-radius:8px;"
          ></iframe>
        </div>

      </div>
    `).join("")}
  `;
}

window.showUploader = function(name) {
  alert("Uploaded by: " + name);
};

window.addEventListener("DOMContentLoaded", loadTornado);
</script>

</body>
</html>
